defaults:
  - env: atari_pong
  - buffer: default
  - collect: default
  - model: rssm_categorical
  - train_wm: default
  - agent: default
  - train_dreamer: default
  - baselines: default
  - benchmark: default
  - ablation: null    # optional; e.g. ablation=no_free_nats (see configs/ablation/)
  - _self_

seed: 0

logger:
  backend: tensorboard  # generic interface; add "wandb" in train/logger.py later

viz:
  buffer_dir: null            # path to a saved buffer dir; null -> collect fresh data
  collect_steps: 3000         # steps to collect when buffer_dir is null
  out_dir: experiments/sanity
  num_frames: 8               # frames shown in the sample-sequence grid
  # Phase 1 (world model) visualizations:
  ckpt: null                  # world-model checkpoint (required by reconstruction/open-loop viz)
  wm_out_dir: experiments/phase1
  recon_frames: 8             # timesteps shown side-by-side in reconstruction viz
  warmup: 5                   # posterior warm-up steps before open-loop rollout
  rollout_horizon: 15         # prior-only steps after warm-up
  # Phase 2 (dreamer) visualizations:
  run_dir: null               # dreamer run dir containing metrics.jsonl
  dream_out: null             # output PNG; null -> <run_dir>/dream_vs_real.png
  dream_window: 10            # rolling-mean window (episodes)
  # Phase 3/4 benchmark + ablation plots:
  benchmark_root: experiments/benchmark
  ablation_env: null          # limit ablation summary to one env dir name
  # Phase 4 real-vs-imagined videos:
  video_ckpt: null            # dreamer_loop checkpoint (wm + actor)
  video_out_dir: experiments/videos
  video_branch_points: [30, 150, 400]  # early / middle / late branch starts
  video_horizon: 20           # imagined steps per branch
  video_context: 8            # shared real frames shown before the branch
  video_max_steps: 900        # cap on the recorded real episode
  video_fps: 8

hydra:
  run:
    dir: experiments/runs/${now:%Y-%m-%d_%H-%M-%S}
  job:
    chdir: false
